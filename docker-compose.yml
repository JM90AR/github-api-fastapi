services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: miguel
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: midb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miguel -d midb"]
      interval: 5s
      timeout: 5s
      retries: 5